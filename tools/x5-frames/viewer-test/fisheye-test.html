<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fisheye dewarp viewer — verification</title>
<style>
  html,body{margin:0;background:#111;height:100%;font-family:monospace;color:#ccc}
  #wrap{display:flex;flex-direction:column;height:100%}
  canvas{flex:1;width:100%;display:block;cursor:grab}
  canvas:active{cursor:grabbing}
  #bar{padding:8px 12px;font-size:12px;display:flex;gap:16px;align-items:center}
  input[type=range]{width:240px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="bar">
    <span>drag to look around · </span>
    <label>FOV <input id="fov" type="range" min="40" max="150" value="95"></label>
    <span id="status">loading…</span>
  </div>
</div>
<script>
// Real-time fisheye -> rectilinear dewarp. Single fragment shader, no libs.
// Source: Insta360 X5 single-lens, ~170deg diagonal equidistant fisheye,
// stored as a 16:9 crop. We model it with horizontal/vertical input FOV and
// equidistant mapping (r = f * theta), then let the user pan yaw/pitch with a
// chosen output FOV.
const IH_FOV = 148.2 * Math.PI/180;  // input horizontal fov (rad)
const IV_FOV = 83.3  * Math.PI/180;  // input vertical fov (rad)

const cv = document.getElementById('c');
const gl = cv.getContext('webgl');
const statusEl = document.getElementById('status');
if(!gl){ statusEl.textContent='NO WEBGL'; }

const vsrc = `attribute vec2 p; varying vec2 uv; void main(){ uv=p; gl_Position=vec4(p,0.,1.); }`;
const fsrc = `
precision highp float;
varying vec2 uv;
uniform sampler2D tex;
uniform float aspect;     // canvas width/height
uniform float ofov;       // output (viewport) horizontal fov, rad
uniform float yaw, pitch; // look direction
uniform float ihfov, ivfov;
void main(){
  // viewport ray (pinhole) for this pixel
  float t = tan(ofov*0.5);
  vec3 dir = normalize(vec3(uv.x*t, uv.y*t/aspect, 1.0));
  // rotate by yaw (around y) then pitch (around x)
  float cy=cos(yaw), sy=sin(yaw);
  dir = vec3(cy*dir.x + sy*dir.z, dir.y, -sy*dir.x + cy*dir.z);
  float cp=cos(pitch), sp=sin(pitch);
  dir = vec3(dir.x, cp*dir.y - sp*dir.z, sp*dir.y + cp*dir.z);
  if(dir.z <= 0.0){ gl_FragColor = vec4(0.05,0.05,0.05,1.0); return; }
  // equidistant fisheye: theta from optical axis, phi around it
  float theta = acos(clamp(dir.z, -1.0, 1.0));
  float phi = atan(dir.y, dir.x);
  // map theta along each axis using the per-axis input fov (half-angles)
  float fx = (theta*cos(phi)) / (ihfov*0.5);  // -1..1 at horizontal edge
  float fy = (theta*sin(phi)) / (ivfov*0.5);
  vec2 tc = vec2(0.5 + 0.5*fx, 0.5 - 0.5*fy);
  if(tc.x<0.0||tc.x>1.0||tc.y<0.0||tc.y>1.0){ gl_FragColor=vec4(0.05,0.05,0.05,1.0); return; }
  gl_FragColor = texture2D(tex, tc);
}`;
function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);
  if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(o);return o;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,vsrc));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fsrc));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),gl.STATIC_DRAW);
const pl=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(pl);
gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
const U=n=>gl.getUniformLocation(prog,n);
let yaw=0,pitch=0,ofov=95*Math.PI/180;

const tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
const img=new Image();
img.onload=()=>{gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img);
  statusEl.textContent='ready · '+img.width+'×'+img.height;draw();};
img.onerror=()=>statusEl.textContent='IMAGE LOAD FAILED';
img.src = (new URLSearchParams(location.search)).get('img') || 'raw_doors.jpg';

function resize(){cv.width=cv.clientWidth;cv.height=cv.clientHeight;gl.viewport(0,0,cv.width,cv.height);}
function draw(){resize();
  gl.uniform1f(U('aspect'),cv.width/cv.height);
  gl.uniform1f(U('ofov'),ofov);gl.uniform1f(U('yaw'),yaw);gl.uniform1f(U('pitch'),pitch);
  gl.uniform1f(U('ihfov'),IH_FOV);gl.uniform1f(U('ivfov'),IV_FOV);
  gl.uniform1i(U('tex'),0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}
let drag=false,lx=0,ly=0;
cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
addEventListener('mouseup',()=>drag=false);
addEventListener('mousemove',e=>{if(!drag)return;
  yaw  += (e.clientX-lx)*0.0025; pitch += (e.clientY-ly)*0.0025;
  pitch=Math.max(-0.6,Math.min(0.6,pitch));
  yaw=Math.max(-0.9,Math.min(0.9,yaw));
  lx=e.clientX;ly=e.clientY;draw();});
document.getElementById('fov').addEventListener('input',e=>{ofov=e.target.value*Math.PI/180;draw();});
addEventListener('resize',draw);
</script>
</body>
</html>
